version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: schoolerp-db
    restart: always
    environment:
      POSTGRES_USER: schooladmin
      POSTGRES_PASSWORD: schoolpassword
      POSTGRES_DB: schoolerp_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: schoolerp-app
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://schooladmin:schoolpassword@db:5432/schoolerp_dev?schema=public
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-change-me-in-production}
      NODE_ENV: development
    ports:
      - "3000:3000"

volumes:
  postgres_data:
