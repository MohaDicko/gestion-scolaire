version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: schoolerp-db
    restart: always
    environment:
      POSTGRES_USER: schooladmin
      POSTGRES_PASSWORD: schoolpassword
      POSTGRES_DB: SchoolERP_Dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: schoolerp-api
    depends_on:
      - db
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=SchoolERP_Dev;Username=schooladmin;Password=schoolpassword
      - Jwt__Key=SchoolERP_SuperSecret_JWT_Key_2025_Min32Chars!
      - Cors__AllowedOrigins=http://localhost:80
    ports:
      - "5000:8080"

  frontend:
    build:
      context: ./school-erp-frontend
      dockerfile: Dockerfile
    container_name: schoolerp-web
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
