version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: schoolerp-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - schoolerp_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: schoolerp-api-prod
    restart: unless-stopped
    depends_on:
      - db
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Jwt__Key=${JWT_SECRET_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Cors__AllowedOrigins=${FRONTEND_CORS_URL}
    ports:
      - "5000:8080"
    networks:
      - schoolerp_network

  frontend:
    build:
      context: ./school-erp-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${PUBLIC_API_URL}
    container_name: schoolerp-web-prod
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - schoolerp_network

volumes:
  postgres_data_prod:

networks:
  schoolerp_network:
    driver: bridge
